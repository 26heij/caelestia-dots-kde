name: Hyprctl Shim Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'shell/**/*.qml'
      - 'src/bin/hypr_kwin_map.json'
      - '.github/scripts/test_hypr_shim.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'shell/**/*.qml'
      - 'src/bin/hypr_kwin_map.json'
      - '.github/scripts/test_hypr_shim.py'

jobs:
  test-shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Run Hyprctl Shim Test
        run: python3 .github/scripts/test_hypr_shim.py
